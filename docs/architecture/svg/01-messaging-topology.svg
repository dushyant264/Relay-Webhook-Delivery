<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="460" viewBox="0 0 1000 460" font-family="system-ui, 'Segoe UI', sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#52514e"/></marker>
    <marker id="arg" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#898781"/></marker>
  </defs>
  <rect width="1000" height="460" fill="#fcfcfb"/>
  <text x="30" y="34" font-size="17" font-weight="600" fill="#0b0b0b">RabbitMQ Topology — the TTL retry ladder</text>
  <text x="30" y="52" font-size="12" fill="#52514e">diamonds = exchanges · rounded boxes = durable queues · dashed = TTL-expiry dead-lettering</text>

  <!-- events exchange + fanout queue -->
  <polygon points="90,110 150,90 210,110 150,130" fill="#fdf3d7" stroke="#c98500"/>
  <text x="150" y="114" font-size="11.5" font-weight="600" fill="#0b0b0b" text-anchor="middle">relay.events</text>
  <rect x="70" y="170" width="160" height="40" rx="8" fill="#fdf3d7" stroke="#c98500"/>
  <text x="150" y="194" font-size="12" fill="#0b0b0b" text-anchor="middle">relay.event-fanout</text>
  <line x1="150" y1="130" x2="150" y2="166" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- dispatch fanout consumer -->
  <rect x="70" y="250" width="160" height="44" rx="8" fill="#e3edfb" stroke="#2a78d6"/>
  <text x="150" y="269" font-size="12" font-weight="600" fill="#0b0b0b" text-anchor="middle">Dispatch: fan-out</text>
  <text x="150" y="285" font-size="11" fill="#52514e" text-anchor="middle">1 event → N deliveries</text>
  <line x1="150" y1="210" x2="150" y2="246" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- deliveries exchange + queue -->
  <polygon points="330,110 405,90 480,110 405,130" fill="#fdf3d7" stroke="#c98500"/>
  <text x="405" y="114" font-size="11.5" font-weight="600" fill="#0b0b0b" text-anchor="middle">relay.deliveries</text>
  <rect x="325" y="170" width="160" height="40" rx="8" fill="#fdf3d7" stroke="#c98500"/>
  <text x="405" y="194" font-size="12" fill="#0b0b0b" text-anchor="middle">relay.deliveries</text>
  <line x1="405" y1="130" x2="405" y2="166" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>

  <path d="M230 270 C 300 270, 340 230, 336 214" fill="none" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="300" y="252" font-size="10.5" fill="#52514e">publish, attempt=1</text>

  <!-- delivery consumer -->
  <rect x="325" y="250" width="160" height="44" rx="8" fill="#e3edfb" stroke="#2a78d6"/>
  <text x="405" y="269" font-size="12" font-weight="600" fill="#0b0b0b" text-anchor="middle">Dispatch: delivery</text>
  <text x="405" y="285" font-size="11" fill="#52514e" text-anchor="middle">sign · POST · record</text>
  <line x1="405" y1="210" x2="405" y2="246" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- subscriber -->
  <rect x="325" y="330" width="160" height="40" rx="8" fill="#fcfcfb" stroke="#52514e"/>
  <text x="405" y="354" font-size="12" font-weight="600" fill="#0b0b0b" text-anchor="middle">Subscriber (2xx?)</text>
  <line x1="405" y1="294" x2="405" y2="326" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- retry exchange -->
  <polygon points="600,270 685,250 770,270 685,290" fill="#fdf3d7" stroke="#c98500"/>
  <text x="685" y="274" font-size="11.5" font-weight="600" fill="#0b0b0b" text-anchor="middle">relay.retry</text>
  <path d="M485 262 C 540 262, 560 266, 596 268" fill="none" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="540" y="252" font-size="10.5" fill="#52514e">fail: attempt n → tier min(n-1, 4)</text>

  <!-- ladder queues -->
  <g font-size="11.5" fill="#0b0b0b" text-anchor="middle">
    <rect x="560" y="320" width="80" height="34" rx="7" fill="#fdf3d7" stroke="#c98500"/><text x="600" y="341">10s</text>
    <rect x="650" y="320" width="80" height="34" rx="7" fill="#fdf3d7" stroke="#c98500"/><text x="690" y="341">1m</text>
    <rect x="740" y="320" width="80" height="34" rx="7" fill="#fdf3d7" stroke="#c98500"/><text x="780" y="341">5m</text>
    <rect x="830" y="320" width="70" height="34" rx="7" fill="#fdf3d7" stroke="#c98500"/><text x="865" y="341">30m</text>
    <rect x="910" y="320" width="60" height="34" rx="7" fill="#fdf3d7" stroke="#c98500"/><text x="940" y="341">2h</text>
  </g>
  <text x="765" y="384" font-size="11" fill="#52514e" text-anchor="middle">each queue: x-message-ttl + x-dead-letter-exchange → relay.deliveries</text>
  <line x1="640" y1="290" x2="605" y2="317" stroke="#52514e" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="685" y1="290" x2="688" y2="316" stroke="#52514e" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="730" y1="290" x2="772" y2="317" stroke="#52514e" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="760" y1="284" x2="856" y2="317" stroke="#52514e" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="768" y1="278" x2="930" y2="317" stroke="#52514e" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- TTL expiry back to deliveries exchange (dashed) -->
  <path d="M600 407 C 500 430, 460 200, 470 120 C 472 112, 476 110, 482 110" fill="none" stroke="#898781" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arg)"/>
  <path d="M600 354 L600 407" fill="none" stroke="#898781" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="520" y="428" font-size="10.5" fill="#898781">TTL expiry → dead-letters back into relay.deliveries (no head-of-line blocking)</text>

  <!-- DLX -->
  <polygon points="600,150 665,132 730,150 665,168" fill="#fbe4e4" stroke="#d03b3b"/>
  <text x="665" y="154" font-size="11.5" font-weight="600" fill="#0b0b0b" text-anchor="middle">relay.dlx</text>
  <rect x="760" y="132" width="150" height="38" rx="8" fill="#fbe4e4" stroke="#d03b3b"/>
  <text x="835" y="155" font-size="12" fill="#0b0b0b" text-anchor="middle">relay.dlq</text>
  <line x1="730" y1="150" x2="756" y2="150" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <path d="M485 254 C 540 230, 560 190, 608 162" fill="none" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="565" y="212" font-size="10.5" fill="#52514e">attempts exhausted (6)</text>
</svg>
