<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="540" viewBox="0 0 1000 540" font-family="system-ui, 'Segoe UI', sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#52514e"/></marker>
  </defs>
  <rect width="1000" height="540" fill="#fcfcfb"/>
  <text x="30" y="34" font-size="17" font-weight="600" fill="#0b0b0b">Relay — System Overview</text>
  <text x="30" y="52" font-size="12" fill="#52514e">Go = blue · TypeScript = violet · RabbitMQ = amber · datastores = gray</text>

  <!-- Producer / Operator -->
  <rect x="30" y="110" width="130" height="52" rx="8" fill="#fcfcfb" stroke="#52514e"/>
  <text x="95" y="132" font-size="13" font-weight="600" fill="#0b0b0b" text-anchor="middle">Producer</text>
  <text x="95" y="148" font-size="11" fill="#52514e" text-anchor="middle">your services</text>

  <rect x="30" y="430" width="130" height="52" rx="8" fill="#fcfcfb" stroke="#52514e"/>
  <text x="95" y="452" font-size="13" font-weight="600" fill="#0b0b0b" text-anchor="middle">Operator</text>
  <text x="95" y="468" font-size="11" fill="#52514e" text-anchor="middle">dashboard / API</text>

  <!-- Ingest -->
  <rect x="230" y="102" width="160" height="68" rx="8" fill="#e3edfb" stroke="#2a78d6"/>
  <text x="310" y="128" font-size="13" font-weight="600" fill="#0b0b0b" text-anchor="middle">Ingest (Go)</text>
  <text x="310" y="144" font-size="11" fill="#52514e" text-anchor="middle">auth · validate</text>
  <text x="310" y="158" font-size="11" fill="#52514e" text-anchor="middle">persist · publish</text>

  <!-- RabbitMQ container -->
  <rect x="450" y="72" width="220" height="260" rx="10" fill="#fdf9ec" stroke="#c98500" stroke-dasharray="5 4"/>
  <text x="560" y="94" font-size="12" font-weight="600" fill="#8a5c00" text-anchor="middle">RabbitMQ</text>
  <rect x="470" y="106" width="180" height="38" rx="6" fill="#fdf3d7" stroke="#c98500"/>
  <text x="560" y="129" font-size="12" fill="#0b0b0b" text-anchor="middle">event-fanout queue</text>
  <rect x="470" y="154" width="180" height="38" rx="6" fill="#fdf3d7" stroke="#c98500"/>
  <text x="560" y="177" font-size="12" fill="#0b0b0b" text-anchor="middle">deliveries queue</text>
  <rect x="470" y="202" width="180" height="52" rx="6" fill="#fdf3d7" stroke="#c98500"/>
  <text x="560" y="223" font-size="12" fill="#0b0b0b" text-anchor="middle">retry ladder (TTL)</text>
  <text x="560" y="239" font-size="11" fill="#52514e" text-anchor="middle">10s · 1m · 5m · 30m · 2h</text>
  <rect x="470" y="264" width="180" height="38" rx="6" fill="#fdf3d7" stroke="#c98500"/>
  <text x="560" y="287" font-size="12" fill="#0b0b0b" text-anchor="middle">dead-letter queue</text>

  <!-- Dispatch -->
  <rect x="730" y="102" width="160" height="68" rx="8" fill="#e3edfb" stroke="#2a78d6"/>
  <text x="810" y="128" font-size="13" font-weight="600" fill="#0b0b0b" text-anchor="middle">Dispatch (Go)</text>
  <text x="810" y="144" font-size="11" fill="#52514e" text-anchor="middle">fan-out · sign · POST</text>
  <text x="810" y="158" font-size="11" fill="#52514e" text-anchor="middle">retry · breaker</text>

  <!-- Subscribers -->
  <rect x="730" y="220" width="160" height="44" rx="8" fill="#fcfcfb" stroke="#52514e"/>
  <text x="810" y="238" font-size="12" font-weight="600" fill="#0b0b0b" text-anchor="middle">Subscriber A</text>
  <text x="810" y="254" font-size="11" fill="#52514e" text-anchor="middle">HMAC-verified webhook</text>
  <rect x="730" y="276" width="160" height="36" rx="8" fill="#fcfcfb" stroke="#52514e"/>
  <text x="810" y="298" font-size="12" font-weight="600" fill="#0b0b0b" text-anchor="middle">Subscriber B</text>

  <!-- Datastores -->
  <rect x="230" y="250" width="160" height="56" rx="8" fill="#f0efec" stroke="#898781"/>
  <text x="310" y="273" font-size="13" font-weight="600" fill="#0b0b0b" text-anchor="middle">Postgres</text>
  <text x="310" y="290" font-size="11" fill="#52514e" text-anchor="middle">system of record + audit</text>
  <rect x="230" y="330" width="160" height="52" rx="8" fill="#f0efec" stroke="#898781"/>
  <text x="310" y="351" font-size="13" font-weight="600" fill="#0b0b0b" text-anchor="middle">Redis</text>
  <text x="310" y="368" font-size="11" fill="#52514e" text-anchor="middle">rate limit · breaker · cache</text>

  <!-- Control plane -->
  <rect x="230" y="422" width="170" height="68" rx="8" fill="#ece9fa" stroke="#4a3aa7"/>
  <text x="315" y="448" font-size="13" font-weight="600" fill="#0b0b0b" text-anchor="middle">Control Plane (TS)</text>
  <text x="315" y="464" font-size="11" fill="#52514e" text-anchor="middle">tenants · endpoints · keys</text>
  <text x="315" y="478" font-size="11" fill="#52514e" text-anchor="middle">delivery logs · dashboard</text>

  <!-- Arrows -->
  <line x1="160" y1="136" x2="226" y2="136" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="193" y="126" font-size="10.5" fill="#52514e" text-anchor="middle">POST /v1/events</text>

  <line x1="390" y1="125" x2="466" y2="125" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="428" y="115" font-size="10.5" fill="#52514e" text-anchor="middle">confirmed</text>

  <line x1="310" y1="170" x2="310" y2="246" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="318" y="212" font-size="10.5" fill="#52514e">insert event</text>

  <line x1="650" y1="125" x2="726" y2="125" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="688" y="115" font-size="10.5" fill="#52514e" text-anchor="middle">consume</text>

  <line x1="810" y1="170" x2="810" y2="216" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="818" y="196" font-size="10.5" fill="#52514e">signed POST</text>

  <path d="M730 160 C 700 190, 690 210, 654 224" fill="none" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="712" y="206" font-size="10.5" fill="#52514e" text-anchor="end">on failure → backoff tier</text>

  <path d="M470 230 C 440 230, 440 180, 466 176" fill="none" stroke="#898781" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="452" y="208" font-size="10.5" fill="#898781" text-anchor="end">TTL expiry re-queues</text>

  <path d="M730 150 C 620 340, 420 290, 394 280" fill="none" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="560" y="330" font-size="10.5" fill="#52514e" text-anchor="middle">record every attempt (audit trail)</text>

  <path d="M730 140 C 570 380, 420 360, 394 356" fill="none" stroke="#898781" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>

  <line x1="160" y1="456" x2="226" y2="456" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="193" y="446" font-size="10.5" fill="#52514e" text-anchor="middle">manage</text>

  <line x1="315" y1="422" x2="313" y2="310" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="322" y="402" font-size="10.5" fill="#52514e">config + logs</text>
</svg>
