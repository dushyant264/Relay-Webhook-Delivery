<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" font-family="system-ui, 'Segoe UI', sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#52514e"/></marker>
  </defs>
  <rect width="1000" height="520" fill="#fcfcfb"/>
  <text x="30" y="34" font-size="17" font-weight="600" fill="#0b0b0b">Data Model (Postgres) — configuration left, delivery pipeline right</text>
  <text x="30" y="52" font-size="12" fill="#52514e">arrows point parent → child (FK) · UNIQUE constraints marked are the idempotency layers</text>

  <g font-size="11" fill="#52514e">
    <!-- tenants -->
    <rect x="40" y="90" width="170" height="58" rx="8" fill="#f0efec" stroke="#898781"/>
    <text x="125" y="110" font-size="12.5" font-weight="600" fill="#0b0b0b" text-anchor="middle">tenants</text>
    <text x="125" y="127" text-anchor="middle">id · name</text>

    <!-- applications -->
    <rect x="40" y="200" width="170" height="58" rx="8" fill="#f0efec" stroke="#898781"/>
    <text x="125" y="220" font-size="12.5" font-weight="600" fill="#0b0b0b" text-anchor="middle">applications</text>
    <text x="125" y="237" text-anchor="middle">id · tenant_id · name</text>
    <line x1="125" y1="148" x2="125" y2="196" stroke="#52514e" stroke-width="1.5" marker-end="url(#ar)"/>

    <!-- api_keys -->
    <rect x="40" y="320" width="170" height="72" rx="8" fill="#f0efec" stroke="#898781"/>
    <text x="125" y="340" font-size="12.5" font-weight="600" fill="#0b0b0b" text-anchor="middle">api_keys</text>
    <text x="125" y="357" text-anchor="middle">prefix UQ · key_hash</text>
    <text x="125" y="372" text-anchor="middle">revoked_at</text>
    <line x1="100" y1="258" x2="105" y2="316" stroke="#52514e" stroke-width="1.5" marker-end="url(#ar)"/>

    <!-- event_types -->
    <rect x="240" y="320" width="170" height="58" rx="8" fill="#f0efec" stroke="#898781"/>
    <text x="325" y="340" font-size="12.5" font-weight="600" fill="#0b0b0b" text-anchor="middle">event_types</text>
    <text x="325" y="357" text-anchor="middle">UQ (application_id, name)</text>
    <path d="M180 258 C 230 280, 280 295, 315 316" fill="none" stroke="#52514e" stroke-width="1.5" marker-end="url(#ar)"/>

    <!-- endpoints -->
    <rect x="260" y="150" width="190" height="86" rx="8" fill="#f0efec" stroke="#898781"/>
    <text x="355" y="170" font-size="12.5" font-weight="600" fill="#0b0b0b" text-anchor="middle">endpoints</text>
    <text x="355" y="187" text-anchor="middle">url · secret (HMAC)</text>
    <text x="355" y="202" text-anchor="middle">rate_limit_per_sec</text>
    <text x="355" y="217" text-anchor="middle">disabled</text>
    <line x1="210" y1="220" x2="256" y2="204" stroke="#52514e" stroke-width="1.5" marker-end="url(#ar)"/>

    <!-- endpoint_subscriptions -->
    <rect x="490" y="150" width="200" height="58" rx="8" fill="#f0efec" stroke="#898781"/>
    <text x="590" y="170" font-size="12.5" font-weight="600" fill="#0b0b0b" text-anchor="middle">endpoint_subscriptions</text>
    <text x="590" y="187" text-anchor="middle">PK (endpoint_id, event_type)</text>
    <line x1="450" y1="182" x2="486" y2="180" stroke="#52514e" stroke-width="1.5" marker-end="url(#ar)"/>

    <!-- events -->
    <rect x="490" y="300" width="210" height="86" rx="8" fill="#e3edfb" stroke="#2a78d6"/>
    <text x="595" y="320" font-size="12.5" font-weight="600" fill="#0b0b0b" text-anchor="middle">events</text>
    <text x="595" y="337" text-anchor="middle">event_type · payload jsonb</text>
    <text x="595" y="352" text-anchor="middle">UQ (application_id,</text>
    <text x="595" y="366" text-anchor="middle">idempotency_key) ← producer dedup</text>
    <path d="M210 240 C 330 290, 420 310, 486 330" fill="none" stroke="#52514e" stroke-width="1.5" marker-end="url(#ar)"/>

    <!-- deliveries -->
    <rect x="760" y="200" width="210" height="90" rx="8" fill="#e3edfb" stroke="#2a78d6"/>
    <text x="865" y="220" font-size="12.5" font-weight="600" fill="#0b0b0b" text-anchor="middle">deliveries</text>
    <text x="865" y="237" text-anchor="middle">status: pending → succeeded</text>
    <text x="865" y="251" text-anchor="middle">| failed → dead · attempt_count</text>
    <text x="865" y="270" text-anchor="middle">UQ (event_id, endpoint_id)</text>
    <text x="865" y="284" text-anchor="middle">← fan-out dedup</text>
    <path d="M700 330 C 740 310, 750 290, 762 270" fill="none" stroke="#52514e" stroke-width="1.5" marker-end="url(#ar)"/>
    <path d="M450 165 C 600 110, 740 150, 800 196" fill="none" stroke="#52514e" stroke-width="1.5" marker-end="url(#ar)"/>

    <!-- delivery_attempts -->
    <rect x="760" y="360" width="210" height="90" rx="8" fill="#e3edfb" stroke="#2a78d6"/>
    <text x="865" y="380" font-size="12.5" font-weight="600" fill="#0b0b0b" text-anchor="middle">delivery_attempts</text>
    <text x="865" y="397" text-anchor="middle">status_code · error · duration_ms</text>
    <text x="865" y="415" text-anchor="middle">UQ (delivery_id, attempt_no)</text>
    <text x="865" y="429" text-anchor="middle">← replay-safe audit trail</text>
    <line x1="865" y1="290" x2="865" y2="356" stroke="#52514e" stroke-width="1.5" marker-end="url(#ar)"/>
  </g>

  <text x="125" y="475" font-size="11.5" fill="#52514e">configuration (control plane writes)</text>
  <text x="740" y="475" font-size="11.5" fill="#52514e">delivery pipeline (ingest + dispatch write)</text>
</svg>
