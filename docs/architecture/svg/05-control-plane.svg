<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420" font-family="system-ui, 'Segoe UI', sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#52514e"/></marker>
  </defs>
  <rect width="1000" height="420" fill="#fcfcfb"/>
  <text x="30" y="34" font-size="17" font-weight="600" fill="#0b0b0b">Control Plane (TypeScript) — management surface, off the hot path</text>

  <rect x="30" y="120" width="140" height="72" rx="8" fill="#fcfcfb" stroke="#52514e"/>
  <text x="100" y="146" font-size="13" font-weight="600" fill="#0b0b0b" text-anchor="middle">Operator</text>
  <text x="100" y="163" font-size="11" fill="#52514e" text-anchor="middle">dashboard (served</text>
  <text x="100" y="177" font-size="11" fill="#52514e" text-anchor="middle">at /) · curl · CI</text>

  <!-- fastify container -->
  <rect x="230" y="80" width="500" height="240" rx="10" fill="#ece9fa" stroke="#4a3aa7"/>
  <text x="480" y="104" font-size="12.5" font-weight="600" fill="#3b2f86" text-anchor="middle">Fastify · port 8080</text>

  <rect x="250" y="120" width="140" height="44" rx="7" fill="#fcfcfb" stroke="#4a3aa7"/>
  <text x="320" y="139" font-size="11.5" font-weight="600" fill="#0b0b0b" text-anchor="middle">auth hook</text>
  <text x="320" y="155" font-size="10.5" fill="#52514e" text-anchor="middle">Bearer ADMIN_TOKEN</text>

  <rect x="410" y="120" width="140" height="44" rx="7" fill="#fcfcfb" stroke="#4a3aa7"/>
  <text x="480" y="139" font-size="11.5" font-weight="600" fill="#0b0b0b" text-anchor="middle">zod validation</text>
  <text x="480" y="155" font-size="10.5" fill="#52514e" text-anchor="middle">typed schemas</text>

  <rect x="570" y="120" width="140" height="44" rx="7" fill="#fcfcfb" stroke="#4a3aa7"/>
  <text x="640" y="139" font-size="11.5" font-weight="600" fill="#0b0b0b" text-anchor="middle">SQL layer (pg)</text>
  <text x="640" y="155" font-size="10.5" fill="#52514e" text-anchor="middle">no ORM, visible queries</text>

  <line x1="390" y1="142" x2="406" y2="142" stroke="#52514e" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="550" y1="142" x2="566" y2="142" stroke="#52514e" stroke-width="1.5" marker-end="url(#ar)"/>

  <g font-size="11.5" fill="#0b0b0b" text-anchor="middle">
    <rect x="250" y="195" width="120" height="36" rx="7" fill="#fcfcfb" stroke="#4a3aa7"/><text x="310" y="217">tenants · apps</text>
    <rect x="380" y="195" width="120" height="36" rx="7" fill="#fcfcfb" stroke="#4a3aa7"/><text x="440" y="217">event types</text>
    <rect x="510" y="195" width="200" height="36" rx="7" fill="#fcfcfb" stroke="#4a3aa7"/><text x="610" y="217">endpoints + subscriptions</text>
    <rect x="250" y="245" width="120" height="36" rx="7" fill="#fcfcfb" stroke="#4a3aa7"/><text x="310" y="267">api keys</text>
    <rect x="380" y="245" width="150" height="36" rx="7" fill="#fcfcfb" stroke="#4a3aa7"/><text x="455" y="267">delivery logs</text>
    <rect x="540" y="245" width="170" height="36" rx="7" fill="#fcfcfb" stroke="#4a3aa7"/><text x="625" y="267">overview stats</text>
  </g>

  <line x1="170" y1="156" x2="226" y2="156" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="198" y="146" font-size="10.5" fill="#52514e" text-anchor="middle">HTTPS</text>

  <!-- postgres -->
  <rect x="790" y="150" width="180" height="72" rx="8" fill="#f0efec" stroke="#898781"/>
  <text x="880" y="176" font-size="13" font-weight="600" fill="#0b0b0b" text-anchor="middle">Postgres</text>
  <text x="880" y="193" font-size="11" fill="#52514e" text-anchor="middle">shared schema — the only</text>
  <text x="880" y="207" font-size="11" fill="#52514e" text-anchor="middle">link to the data plane</text>
  <line x1="730" y1="186" x2="786" y2="186" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- data plane reads -->
  <rect x="790" y="270" width="180" height="80" rx="8" fill="#e3edfb" stroke="#2a78d6"/>
  <text x="880" y="294" font-size="12" font-weight="600" fill="#0b0b0b" text-anchor="middle">Ingest / Dispatch (Go)</text>
  <text x="880" y="311" font-size="11" fill="#52514e" text-anchor="middle">read config from Postgres —</text>
  <text x="880" y="325" font-size="11" fill="#52514e" text-anchor="middle">never RPC to control plane,</text>
  <text x="880" y="339" font-size="11" fill="#52514e" text-anchor="middle">planes fail independently</text>
  <line x1="880" y1="266" x2="880" y2="226" stroke="#898781" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>

  <text x="480" y="360" font-size="11.5" fill="#52514e" text-anchor="middle">secrets discipline: API keys sha256-hashed at rest, shown once · endpoint HMAC secrets generated server-side</text>
</svg>
