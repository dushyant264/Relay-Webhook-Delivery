<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" font-family="system-ui, 'Segoe UI', sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#52514e"/></marker>
  </defs>
  <rect width="1000" height="560" fill="#fcfcfb"/>
  <text x="30" y="34" font-size="17" font-weight="600" fill="#0b0b0b">Dispatch (Go) — delivery decision flow</text>
  <text x="30" y="52" font-size="12" fill="#52514e">diamonds = checks · every path records its outcome in the Postgres audit trail</text>

  <rect x="60" y="80" width="200" height="44" rx="8" fill="#fdf3d7" stroke="#c98500"/>
  <text x="160" y="99" font-size="12" font-weight="600" fill="#0b0b0b" text-anchor="middle">DeliveryMsg consumed</text>
  <text x="160" y="115" font-size="11" fill="#52514e" text-anchor="middle">{delivery_id, attempt n}</text>

  <rect x="60" y="160" width="200" height="40" rx="8" fill="#e3edfb" stroke="#2a78d6"/>
  <text x="160" y="184" font-size="12" fill="#0b0b0b" text-anchor="middle">load delivery + endpoint + event</text>
  <line x1="160" y1="124" x2="160" y2="156" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- checks -->
  <polygon points="160,240 260,275 160,310 60,275" fill="#fcfcfb" stroke="#52514e"/>
  <text x="160" y="272" font-size="11.5" fill="#0b0b0b" text-anchor="middle">already finished</text>
  <text x="160" y="287" font-size="11.5" fill="#0b0b0b" text-anchor="middle">(succeeded/dead)?</text>
  <line x1="160" y1="200" x2="160" y2="236" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="260" y1="275" x2="330" y2="275" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <rect x="334" y="255" width="140" height="40" rx="8" fill="#f0efec" stroke="#898781"/>
  <text x="404" y="279" font-size="11.5" fill="#0b0b0b" text-anchor="middle">yes → ack (no-op)</text>

  <polygon points="160,350 265,385 160,420 55,385" fill="#fcfcfb" stroke="#52514e"/>
  <text x="160" y="382" font-size="11.5" fill="#0b0b0b" text-anchor="middle">breaker open /</text>
  <text x="160" y="397" font-size="11.5" fill="#0b0b0b" text-anchor="middle">rate limited?</text>
  <line x1="160" y1="310" x2="160" y2="346" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="172" y="332" font-size="10.5" fill="#52514e">no</text>
  <line x1="265" y1="385" x2="330" y2="385" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <rect x="334" y="360" width="190" height="50" rx="8" fill="#fdf3d7" stroke="#c98500"/>
  <text x="429" y="381" font-size="11.5" fill="#0b0b0b" text-anchor="middle">yes → park in 1m / 10s tier</text>
  <text x="429" y="397" font-size="11" fill="#52514e" text-anchor="middle">attempt NOT consumed</text>

  <rect x="60" y="460" width="200" height="56" rx="8" fill="#e3edfb" stroke="#2a78d6"/>
  <text x="160" y="483" font-size="12" font-weight="600" fill="#0b0b0b" text-anchor="middle">HMAC-sign + HTTP POST</text>
  <text x="160" y="500" font-size="11" fill="#52514e" text-anchor="middle">Relay-Signature · 10s timeout</text>
  <line x1="160" y1="420" x2="160" y2="456" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="172" y="442" font-size="10.5" fill="#52514e">no</text>

  <!-- outcome diamond -->
  <polygon points="560,488 640,458 720,488 640,518" fill="#fcfcfb" stroke="#52514e"/>
  <text x="640" y="492" font-size="12" fill="#0b0b0b" text-anchor="middle">2xx?</text>
  <line x1="260" y1="488" x2="556" y2="488" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- success -->
  <rect x="770" y="380" width="200" height="56" rx="8" fill="#e2f3e2" stroke="#0ca30c"/>
  <text x="870" y="403" font-size="12" font-weight="600" fill="#0b0b0b" text-anchor="middle">✓ succeeded</text>
  <text x="870" y="420" font-size="11" fill="#52514e" text-anchor="middle">record attempt · reset breaker</text>
  <path d="M690 465 C 720 430, 740 415, 766 408" fill="none" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="716" y="428" font-size="10.5" fill="#006300">yes</text>

  <!-- failure branch -->
  <polygon points="560,300 640,270 720,300 640,330" fill="#fcfcfb" stroke="#52514e"/>
  <text x="640" y="297" font-size="11.5" fill="#0b0b0b" text-anchor="middle">attempt ≥ 6?</text>
  <text x="640" y="312" font-size="10.5" fill="#52514e" text-anchor="middle">(breaker counts fail)</text>
  <line x1="640" y1="458" x2="640" y2="334" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="652" y="400" font-size="10.5" fill="#a33">no (non-2xx / timeout)</text>

  <rect x="770" y="160" width="200" height="56" rx="8" fill="#fbe4e4" stroke="#d03b3b"/>
  <text x="870" y="183" font-size="12" font-weight="600" fill="#0b0b0b" text-anchor="middle">✕ dead</text>
  <text x="870" y="200" font-size="11" fill="#52514e" text-anchor="middle">record attempt · publish to DLQ</text>
  <path d="M690 278 C 720 240, 740 225, 766 205" fill="none" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="718" y="238" font-size="10.5" fill="#a33">yes</text>

  <rect x="440" y="160" width="210" height="56" rx="8" fill="#fdf3d7" stroke="#c98500"/>
  <text x="545" y="183" font-size="12" font-weight="600" fill="#0b0b0b" text-anchor="middle">↻ retry</text>
  <text x="545" y="200" font-size="11" fill="#52514e" text-anchor="middle">attempt n+1 → tier min(n−1, 4)</text>
  <path d="M600 270 C 580 250, 570 240, 556 220" fill="none" stroke="#52514e" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="562" y="248" font-size="10.5" fill="#52514e">no</text>

  <!-- audit note -->
  <rect x="770" y="470" width="200" height="56" rx="8" fill="#f0efec" stroke="#898781"/>
  <text x="870" y="493" font-size="12" font-weight="600" fill="#0b0b0b" text-anchor="middle">Postgres audit trail</text>
  <text x="870" y="510" font-size="11" fill="#52514e" text-anchor="middle">UNIQUE (delivery_id, attempt_no)</text>
  <line x1="720" y1="492" x2="766" y2="494" stroke="#898781" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
</svg>
