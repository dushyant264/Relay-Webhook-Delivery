global:
  scrape_interval: 10s

scrape_configs:
  - job_name: ingest
    static_configs: [{ targets: ["ingest:8081"] }]
  - job_name: dispatch
    static_configs: [{ targets: ["dispatch:8082"] }]
  - job_name: control-plane
    static_configs: [{ targets: ["control-plane:8080"] }]
  - job_name: rabbitmq
    static_configs: [{ targets: ["rabbitmq:15692"] }]
